<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark d-flex justify-content-between">
            <img  src="cvr.webp" width="80" height="80">
            <div class="d-flex justify-content-between align-items-center">
                <a class="nav-link text-light m-3" href="#">Home</a>
                <a class="nav-link text-light m-3" href="#">Events</a>
                <a class="nav-link text-light m-3" href="#">Gallery</a>
                <a class="nav-link text-light m-3" href="#">Registration</a>
                <a class="nav-link text-light m-3" href="#">Contact</a>
            </div>
        </nav>
    </header>
    <section class="container mt-5">
    <h2 class="text-center mb-4">Frequently Asked Questions</h2>
    <div class="accordion" id="faqAccordion">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq1">
                    How to register?
                </button>
            </h2>
            <div id="faq1"
                class="accordion-collapse collapse show"
                data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    Go to Registration Page and submit form.
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq2">
                    Is there a registration fee?
                </button>
            </h2>
            <div id="faq2"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    No, participation is free.
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                    data-bs-toggle="collapse"
                    data-bs-target="#faq3">
                    Can I participate in multiple events?
                </button>
            </h2>
            <div id="faq3"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    Yes, you can register for multiple events.
                </div>
            </div>
        </div>
    </div>
</section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
