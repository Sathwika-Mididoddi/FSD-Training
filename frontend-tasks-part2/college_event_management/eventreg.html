<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark d-flex justify-content-between">
            <img  src="cvr.webp" width="80" height="80">
            <div class="d-flex justify-content-between align-items-center">
                <a class="nav-link text-light m-3" href="#">Home</a>
                <a class="nav-link text-light m-3" href="#">Events</a>
                <a class="nav-link text-light m-3" href="#">Gallery</a>
                <a class="nav-link text-light m-3" href="#">Registration</a>
                <a class="nav-link text-light m-3" href="#">Contact</a>
            </div>
        </nav>
    </header>
    <section class="container mt-5">
    <h2 class="text-center mb-4">Event Registration</h2>
    <form class="border p-4 rounded">
        <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Roll Number</label>
            <input type="text" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Branch</label>
            <input type="text" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Select Event</label>
            <select class="form-select" required>
                <option>Technical Quiz</option>
                <option>Hackathon</option>
                <option>Coding Contest</option>
                <option>Project Expo</option>
                <option>Cultural Fest</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">
            Register
        </button>
    </form>
    <div class="alert alert-success mt-4">
        Registration Successful!
    </div>
</section>
</body>
</html>
