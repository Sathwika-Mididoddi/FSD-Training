<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark d-flex justify-content-between">
            <img src="cvr.webp" width="80" height="80">
            <div class="d-flex justify-content-between align-items-center">
                <a class="nav-link text-light m-3" href="#">Home</a>
                <a class="nav-link text-light m-3" href="#">Events</a>
                <a class="nav-link text-light m-3" href="#">Gallery</a>
                <a class="nav-link text-light m-3" href="#">Registration</a>
                <a class="nav-link text-light m-3" href="#">Contact</a>
            </div>
        </nav>
    </header>
    <section class="container mt-5">
    <h2 class="text-center mb-4">
        Contact Us
    </h2>
    <div class="row">
        <div class="col-md-6">
            <form class="border p-4 rounded">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>
                <button class="btn btn-primary">
                    Send Message
                </button>
            </form>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h4>Event Coordinator</h4>
                <p>Name: Rajesh</p>
                <p>Phone: 9876543210</p>
                <p>Email: coordinator@college.com</p>
                <h5>Follow Us</h5>
                <div>
                    <button class="btn btn-primary m-1">Facebook</button>
                    <button class="btn btn-danger m-1">Instagram</button>
                    <button class="btn btn-info m-1">LinkedIn</button>
                </div>
            </div>
        </div>
    </div>
</section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
