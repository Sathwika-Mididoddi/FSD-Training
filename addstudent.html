<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudent.html">Add Student</a>
        <a href="viewstudents.html">View Students</a>
        <a href="logoutpage.html">Logout</a>
    </nav>
    <h1>Add Student</h1>
    <form action="viewstudents.html">
        <label for="name">Name:</label>
        <input type="text" required id="name"/><br/>
        <label for="rollno">Roll Number:</label>
        <input type="text" pattern="[a-zA-Z0-9]{10}" required id="rollno"/><br/>
        <label for="branch">Branch:</label>
        <input type="text" pattern="[A-Za-z]{3,4}" required id="branch"/><br/>
        <label for="cgpa" >CGPA:</label>
        <input type="number" step="0.01" min="0" max="10" required id="cgpa"/><br/>
        <button type="submit">Add Student</button>
    </form>
</body>
</html>
