<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
    <h1>Register Page</h1>
    <form onsubmit="formsubmit(event)">
        <label for="username">Username:</label>
        <input type="text" required id="username" /><br />
        <label for="email">Email:</label>
        <input type="email" required id="email" /><br />
        <label for="password">Password:</label>
        <input type="password" minlength="8" required id="password" />
        <br />
        <label for="confirmpassword">Confirm Password:</label>
        <input type="password" id="confirmpassword" minlength="8" required /><br />
        <p id="error"></p>
        <button type="submit">Register</button>
    </form>
    <p>Already have an account?<a href="login.html">Login here</a></p>
    <script>
        async function formsubmit(event) {
            event.preventDefault();
            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let pwd = document.getElementById("password").value;
            let cpwd = document.getElementById("confirmpassword").value;
            let err = document.getElementById("error");
            if (pwd !== cpwd) {
                alert("Passwords do not match!!!");
                return
            }
            if (!(/[a-z]/.test(pwd) && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && /[@&%$#]/.test(pwd))) {
                err.innerText = "Password must be a combination of a-z,A-z,0-9,[@$%&#]";
                err.style.color = "red";
                return;
            }
            err.innerText = "";
            let user = {
                username: username,
                email: email,
                password: pwd
            };
            user = JSON.stringify(user);
            //localStorage.setItem("user", user);
            const result=await fetch("http://localhost:3000/users",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:user
            })
            alert("Registration successful");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
