<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav>
    <h1>Register Page</h1>
    <form>
        <label for="username">Username:</label>
        <input type="text" required id="username" /><br/>
        <label for="email">Email:</label>
        <input type="email" required id="email" /><br/>
        <label for="password">Password:</label>
        <input type="password" required id="password" /><br/>
        <label for="confirmpassword">Confirm Password:</label>
        <input type="text" id="confirmpassword" required/><br/>
        <button type="Submit" onclick="formsubmit(event)">Register</button>
    </form>
    <p>Already have an account?<a href="login.html">Login here</a></p>
    <script>
        function formsubmit(event){
            event.preventDefault();
            let username=document.getElementById("username").value;
            let email=document.getElementById("email").value;
            let pwd=document.getElementById("password").value;
            let cpwd=document.getElementById("confirmpassword").value;
            if (pwd!==cpwd)
            {
                alert("Passwords do not match!!!");
            }
            let user={
                username:username,
                email:email,
                password:pwd
            };
            user=JSON.stringify(user);
            console.log(user);
            localStorage.setItem("user",user);
            alert("Registration successful");
            window.location.href="login.html"
        }
    </script>
</body>
</html>
