<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Link rel="stylesheet" href="styles.css" />
</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudent.html">Add Student</a>
        <a href="viewstudents.html">View Students</a>
        <a href="logoutpage.html">Logout</a>
    </nav>
    <form action="viewstudents.html">
        <label for="name">Name:</label>
        <input type="text" required id="name" value="John" /><br />
        <label for="rollno">Roll Number:</label>
        <input type="text" pattern="[a-zA-Z0-9]{10}" required id="rollno" value="23B81A0500" /><br />
        <label for="branch">Branch:</label>
        <input type="text" pattern="[A-Za-z]{3,4}" required id="branch" value="CSE" /><br />
        <label for="cgpa">CGPA:</label>
        <input type="number" step="0.01" min="0" max="10" required id="cgpa" value="8.9" /><br />
        <button type="submit" onclick="updateStudent(event)">Update Student</button>
    </form>
    <script>
        let students = JSON.parse(localStorage.getItem("students"));
        let rn = localStorage.getItem("editRollNo");
        //let student = students.find(s => s.rollno === rn);
        let student = undefined;
        for (let s of students) {
            if (s.rollno === rn) {
                student = s;
                break;
            }
        }
        let name = document.getElementById("name");
        let rollno = document.getElementById("rollno");
        let branch = document.getElementById("branch");
        let cgpa = document.getElementById("cgpa");
        name.value = student.name;
        rollno.value = student.rollno;
        branch.value = student.branch;
        cgpa.value = student.cgpa;
        function updateStudent(event) {
            event.preventDefault();
            let name = document.getElementById("name").value;
            let rollno = document.getElementById("rollno").value;
            let branch = document.getElementById("branch").value;
            let cgpa = document.getElementById("cgpa").value;
            student.name = name;
            student.rollno = rollno;
            student.branch = branch;
            student.cgpa = cgpa;
            localStorage.setItem("students", JSON.stringify(students));
            window.location.href = "viewstudents.html";
        }
    </script>
</body>

</html>
