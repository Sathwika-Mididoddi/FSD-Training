<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark d-flex justify-content-between">
            <img src="cvr.webp" width="80" height="80">
            <div class="d-flex justify-content-between align-items-center">
                <a class="nav-link text-light m-3" href="#">Home</a>
                <a class="nav-link text-light m-3" href="#">Events</a>
                <a class="nav-link text-light m-3" href="#">Gallery</a>
                <a class="nav-link text-light m-3" href="#">Registration</a>
                <a class="nav-link text-light m-3" href="#">Contact</a>
            </div>
        </nav>
    </header>
    <section class="container mt-5">
        <h2 class="text-center mb-4">Gallery</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500"
                        class="img-fluid card-img-top">
                </div>
            </div>
        </div>
    </section>
    <br/>
    <div class="container">
        <div id="carouselExample" class="carousel slide jusify-content-center">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                    aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                    aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500" class="w-100" />
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=500" class="w-100" />
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=500" class="w-100" />
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
